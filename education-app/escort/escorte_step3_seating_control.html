<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">,
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>E-3｜着席・人数コントロール判断</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header>
  E-3｜着席・人数コントロール判断
</header>

<main>

  <div class="card">
    <h2>このSTEPの目的</h2>
    <p>
      空席を「席数」ではなく、<br>
      <strong>流れとして使う判断</strong>を行うことを目的とします。
    </p>
  </div>

  <div class="card">
    <h2>① オペレーション</h2>
    <ul>
      <li>空席状況を正確に把握している</li>
      <li>空いている席へ手を差し伸べて案内できている</li>
      <li>お水提供スタッフへ正確な人数を伝えている</li>
      <li>お待ち合わせ客を把握し適切に案内している</li>
      <li>転席希望・モーニング終了への対応ができている</li>
    </ul>
  </div>

  <div class="card">
    <h2>② 行動判断の考え方</h2>
    <p>
      👉 着席判断は、<br>
      <strong>次工程（オーダー・ドリンク）を左右する分岐点</strong>。
    </p>
  </div>

<div class="card">
  <h3>判断例動画</h3>

  <div style="position: relative; padding-top: 56.25%;">
    <iframe
      src="https://www.youtube.com/embed/xxxxxxxxxxxxx"
      style="position:absolute; top:0; left:0; width:100%; height:100%;"
      frameborder="0"
      allow="accelerometer; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
      allowfullscreen>
    </iframe>
  </div>
</div>

  <!-- ✅ STEP完了ブロック -->
  <div class="card">
    <h2>STEP完了</h2>
    <button
  class="btn-step js-step-toggle"
  data-step-key="escorte-step3">
  このSTEPを完了
</button>

  </div>

</main>

<footer class="step-footer">
  <a href="./escorte.html" class="btn-nav">案内TOPに戻る</a>
  <a href="../progress.html" class="btn-nav">進捗</a>
</footer>

<!-- ✅ 進捗連動用JS（必須） -->
<script>
document.querySelectorAll(".js-step-toggle").forEach(btn => {
  const key = btn.dataset.stepKey;

  // 初期状態
  if (localStorage.getItem(key) === "done") {
    btn.textContent = "✔ 完了済み（再度押すと解除）";
    btn.classList.add("done");
  }

  btn.addEventListener("click", () => {
    if (localStorage.getItem(key) === "done") {
      localStorage.removeItem(key);
      btn.textContent = "このSTEPを完了";
      btn.classList.remove("done");
    } else {
      localStorage.setItem(key, "done");
      btn.textContent = "✔ 完了済み（再度押すと解除）";
      btn.classList.add("done");
    }
  });
});
</script>

</body>
</html>
